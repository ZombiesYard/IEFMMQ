pack_id: fa18c_startup
version: v1
title: "F/A-18C Cold Start (Full S01-S25)"
description: >
  Cold-start to taxi-ready procedure for the F/A-18C Lot 20. Derived from
  Doc/Evaluation/fa18c_startup_master.md and Appendix - Training Task Syllabus.md.
metadata:
  step_registry_path: step_registry.yaml
  vision_layout_id: fa18c_composite_panel_v2
  vision_facts_path: vision_facts.yaml
  vision_priority_steps:
    - S08
    - S15
    - S18
  bios_priority_steps:
    - S01
    - S03
    - S04
    - S05
    - S06
    - S07
    - S09
    - S10
    - S11
    - S12
    - S13
    - S21
  manual_or_out_of_layout_steps:
    - S02
    - S14
    - S16
    - S17
    - S19
    - S20
    - S22
    - S23
    - S24
    - S25
  source_documents:
    - Doc/Evaluation/fa18c_startup_master.md
    - Doc/Evaluation/Appendix - Training Task Syllabus.md
  notes: >
    Full cold-start procedure coverage for steps S01-S25 (phases P1-P6).
    The frozen v0.4 visual contract only uses native left/right DDI plus AMPCD
    exports; UFC, IFEI, and warning/advisory evidence should come from DCS-BIOS.

prerequisites:
  - "Aircraft cold and dark at ramp or carrier; parking brake set."
  - "Ground crew clear; chocks as per mission setup."
  - "Mission radios preset for training frequencies."
  - "Pilot seated with VR hardware on; UFC and DDIs visible."

completion_conditions:
  - "Both engines running and stabilized in green ranges."
  - "Core avionics and flight-control preparation steps completed through S25."
  - "Taxi-ready checks configured for current scenario profile (airfield/carrier)."
  - "Safety-critical cautions reviewed for full cold-start flow S01-S25."

ui_targets:
  - battery_switch
  - generator_left_switch
  - generator_right_switch
  - fire_test_switch
  - apu_switch
  - eng_crank_switch
  - bleed_air_knob
  - lights_test_button
  - left_mdi_brightness_selector
  - right_mdi_brightness_selector
  - ampcd_off_brightness_knob
  - hud_symbology_brightness_knob
  - left_mdi_pb5
  - left_mdi_pb15
  - left_mdi_pb18
  - right_mdi_pb5
  - right_mdi_pb18
  - ufc_comm1_channel_selector_pull
  - ufc_comm1_channel_selector_rotate
  - ufc_comm2_channel_selector_pull
  - ufc_comm2_channel_selector_rotate
  - ins_mode_knob
  - radar_mode_knob
  - obogs_control_switch
  - obogs_flow_knob
  - fcs_reset_button
  - flap_switch
  - takeoff_trim_button
  - fcs_bit_switch
  - refuel_probe_switch
  - throttle_quadrant_reference
  - launch_bar_switch
  - arresting_hook_handle
  - pitot_heater_switch
  - parking_brake_handle
  - ifei_up_button
  - ifei_down_button
  - standby_altimeter_pressure_knob
  - radar_altimeter_bug_knob
  - standby_attitude_cage_knob
  - attitude_source_selector

precondition_gates:
  S01: []
  S02:
    - op: flag_true
      var: vars.power_available
      reason_code: s02_requires_power_available
      reason: "Power must be available before FIRE TEST."
  S03:
    - op: flag_true
      var: vars.power_available
      reason_code: s03_requires_power_available
      reason: "Power must be available before turning APU ON."
  S04:
    - op: flag_true
      var: vars.apu_ready
      reason_code: s04_requires_apu_ready
      reason: "APU READY light must be on before ENG CRANK RIGHT."
  S05:
    - op: flag_true
      var: vars.engine_crank_right_complete
      reason_code: s05_requires_engine_crank_right
      reason: "Right engine start must have begun before right throttle idle."
  S06:
    - op: flag_true
      var: vars.rpm_r_gte_60
      reason_code: s06_requires_rpm_r_gte_60
      reason: "Right engine RPM must be above 60 before BLEED AIR cycle."
  S07:
    - op: flag_true
      var: vars.rpm_r_gte_60
      reason_code: s07_requires_right_engine_running
      reason: "Right engine must be stabilized before lights test."
  S08:
    - op: flag_true
      var: vars.rpm_r_gte_60
      reason_code: s08_requires_right_engine_running
      reason: "Right engine must be stabilized before display power-up."
  S09:
    - op: flag_true
      var: vars.left_ddi_on
      reason_code: s09_requires_left_ddi_on
      reason: "Left DDI must be powered before COMM setup."
    - op: flag_true
      var: vars.right_ddi_on
      reason_code: s09_requires_right_ddi_on
      reason: "Right DDI must be powered before COMM setup."
  S10:
    - op: flag_true
      var: vars.right_engine_nominal_start_params
      reason_code: s10_requires_right_engine_nominal_start_params
      reason: "Right engine start parameters must be in green range before ENG CRANK LEFT."
  S11:
    - op: flag_true
      var: vars.engine_crank_left
      reason_code: s11_requires_engine_crank_left
      reason: "ENG CRANK must be in LEFT before left throttle idle."
    - op: var_gte
      var: vars.rpm_l
      value: 25
      reason_code: s11_requires_rpm_l_gte_25
      reason: "Left engine RPM must reach at least 25 before left throttle idle."
  S12:
    - op: flag_true
      var: vars.rpm_l_gte_60
      reason_code: s12_requires_rpm_l_gte_60
      reason: "Left engine RPM must be at least 60 before INS alignment setup."
    - op: flag_true
      var: vars.throttle_l_not_off
      reason_code: s12_requires_throttle_l_not_off
      reason: "Left throttle must be advanced from OFF before INS alignment setup."
  S13:
    - op: var_gte
      var: vars.ins_mode
      value: 1
      reason_code: s13_requires_ins_mode_set
      reason: "INS mode must be set to GND/CV before radar operation."
  S14:
    - op: flag_true
      var: vars.radar_on
      reason_code: s14_requires_radar_on
      reason: "Radar should be online before life-support flow setup."
  S15:
    - op: flag_true
      var: vars.left_ddi_on
      reason_code: s15_requires_left_ddi_on
      reason: "Left DDI must be powered before FCS reset monitoring."
  S16:
    - op: flag_true
      var: vars.left_ddi_on
      reason_code: s16_requires_left_ddi_on
      reason: "Left DDI must remain powered before flap mode confirmation."
  S17:
    - op: flag_true
      var: vars.left_ddi_on
      reason_code: s17_requires_left_ddi_on
      reason: "Left DDI must remain powered before takeoff trim."
  S18:
    - op: flag_true
      var: vars.right_ddi_on
      reason_code: s18_requires_right_ddi_on
      reason: "Right DDI must be powered before FCS BIT sequence."
  S19:
    - op: flag_true
      var: vars.radar_on
      reason_code: s19_requires_radar_on
      reason: "Core avionics should be online before four-down checks."
  S20:
    - op: flag_true
      var: vars.radar_on
      reason_code: s20_requires_radar_on
      reason: "Core avionics should be online before parking-brake release."
  S21:
    - op: flag_true
      var: vars.radar_on
      reason_code: s21_requires_radar_on
      reason: "Core avionics should be online before BINGO setup."
  S22:
    - op: flag_true
      var: vars.radar_on
      reason_code: s22_requires_radar_on
      reason: "Core avionics should be online before standby altimeter setup."
  S23:
    - op: flag_true
      var: vars.radar_on
      reason_code: s23_requires_radar_on
      reason: "Core avionics should be online before radar altimeter bug setup."
  S24:
    - op: flag_true
      var: vars.radar_on
      reason_code: s24_requires_radar_on
      reason: "Core avionics should be online before standby attitude uncage."
  S25:
    - op: flag_true
      var: vars.radar_on
      reason_code: s25_requires_radar_on
      reason: "Core avionics should be online before attitude source AUTO selection."

completion_gates:
  S01:
    - op: flag_true
      var: vars.battery_on
      reason_code: s01_requires_battery_on
      reason: "BATTERY switch must be ON."
    - op: flag_true
      var: vars.l_gen_on
      reason_code: s01_requires_l_gen_on
      reason: "Left generator must be ON."
    - op: flag_true
      var: vars.r_gen_on
      reason_code: s01_requires_r_gen_on
      reason: "Right generator must be ON."
  S02: []
  S03:
    - op: flag_true
      var: vars.apu_start_support_complete
      reason_code: s03_requires_apu_start_support_complete
      reason: "APU support must be established before moving on (APU READY seen or right-engine start begun)."
  S04:
    - op: flag_true
      var: vars.engine_crank_right_complete
      reason_code: s04_requires_engine_crank_right
      reason: "Right engine start must have begun."
  S05:
    - op: var_gte
      var: vars.rpm_r
      value: 25
      reason_code: s05_requires_rpm_r_gte_25
      reason: "Right engine RPM must be at least 25."
    - op: flag_true
      var: vars.throttle_r_idle_complete
      reason_code: s05_requires_throttle_right_idle
      reason: "Right throttle must be moved from OFF toward IDLE."
  S06:
    - op: flag_true
      var: vars.bleed_air_cycle_complete
      reason_code: s06_requires_bleed_air_norm
      reason: "BLEED AIR knob must return to NORM after full cycle."
  S07: []
  S08:
    - op: flag_true
      var: vars.left_ddi_on
      reason_code: s08_requires_left_ddi_on
      reason: "Left DDI must be powered."
    - op: flag_true
      var: vars.right_ddi_on
      reason_code: s08_requires_right_ddi_on
      reason: "Right DDI must be powered."
    - op: flag_true
      var: vars.mpcd_on
      reason_code: s08_requires_mpcd_on
      reason: "MPCD must be powered."
    - op: flag_true
      var: vars.hud_on
      reason_code: s08_requires_hud_on
      reason: "HUD must be powered."
  S09: []
  S10:
    - op: flag_true
      var: vars.engine_crank_left
      reason_code: s10_requires_engine_crank_left
      reason: "ENG CRANK must be moved to LEFT."
  S11:
    - op: var_gte
      var: vars.rpm_l
      value: 25
      reason_code: s11_requires_rpm_l_gte_25
      reason: "Left engine RPM must be at least 25."
    - op: flag_true
      var: vars.throttle_l_not_off
      reason_code: s11_requires_throttle_l_not_off
      reason: "Left throttle must be moved out of OFF detent."
  S12:
    - op: arg_in_range
      var: vars.ins_mode
      min: 1
      max: 1
      reason_code: s12_requires_ins_mode_gnd
      reason: "INS mode must be set to GND for airfield startup."
  S13:
    - op: flag_true
      var: vars.radar_on
      reason_code: s13_requires_radar_on
      reason: "Radar knob must be set to OPR."
  S14:
    - op: flag_true
      var: vars.obogs_ready
      reason_code: s14_requires_obogs_ready
      reason: "OBOGS control and FLOW must both be ON."
  S15: []
  S16:
    - op: flag_true
      var: vars.flap_auto
      reason_code: s16_requires_flap_auto
      reason: "Flap switch must be set to AUTO."
  S17:
    - op: flag_true
      var: vars.takeoff_trim_set
      reason_code: s17_requires_takeoff_trim_pressed
      reason: "TAKEOFF TRIM button must be pressed."
  S18: []
  S19: []
  S20:
    - op: flag_true
      var: vars.parking_brake_released
      reason_code: s20_requires_parking_brake_released
      reason: "Parking brake must be released."
  S21:
    - op: flag_true
      var: vars.bingo_fuel_set
      reason_code: s21_requires_bingo_fuel_set
      reason: "BINGO fuel must be set on the IFEI."
  S22: []
  S23:
    - op: arg_in_range
      var: vars.radar_altimeter_bug_value
      min: 180
      max: 220
      reason_code: s23_requires_radalt_bug_airfield_200
      reason: "Radar altimeter bug should be near 200 ft for airfield startup."
  S24:
    - op: flag_true
      var: vars.standby_attitude_uncaged
      reason_code: s24_requires_standby_attitude_uncaged
      reason: "Standby attitude indicator must be uncaged."
  S25:
    - op: flag_true
      var: vars.attitude_source_auto
      reason_code: s25_requires_attitude_source_auto
      reason: "Attitude source selector must be set to AUTO."

profile_overrides:
  carrier:
    completion_gates:
      S12:
        - op: arg_in_range
          var: vars.ins_mode
          min: 4
          max: 4
          reason_code: s12_requires_ins_mode_cv
          reason: "INS mode must be set to CV for carrier startup."
      S23:
        - op: arg_in_range
          var: vars.radar_altimeter_bug_value
          min: 30
          max: 60
          reason_code: s23_requires_radalt_bug_carrier_40
          reason: "Radar altimeter bug should be near 40 ft for carrier operations."

steps:
  - id: S01
    phase: P1
    critical: true
    observability: observable
    evidence_requirements:
      - var
      - gate
      - delta
    preconditions: []
    completion_conditions:
      - "BATTERY switch ON."
      - "Left/Right GEN switches in NORM/ON."
    ui_targets:
      - battery_switch
      - generator_left_switch
      - generator_right_switch
    tutor_prompts:
      - "Ensure aircraft power is applied: flip BATTERY to ON; verify both generator switches are ON."

  - id: S02
    phase: P1
    critical: true
    observability: observable
    overlay_enabled: false
    evidence_requirements:
      - var
      - delta
      - gate
    preconditions:
      - "Aircraft powered (BATTERY ON, generators ON)."
    completion_conditions:
      - "Fire test A completed with correct aural/visual indications."
      - "Fire test B completed after ~10s pause."
    ui_targets: []
    tutor_prompts:
      - "Fire test is currently skipped in the live tutor flow; continue with APU start once aircraft power is stable."

  - id: S03
    phase: P1
    critical: true
    observability: observable
    evidence_requirements:
      - var
      - gate
      - delta
    preconditions:
      - "Power available (S01 complete)."
    completion_conditions:
      - "APU switch ON."
      - "APU READY light illuminated."
    ui_targets:
      - apu_switch
    tutor_prompts:
      - "Set APU switch to ON; watch for green APU READY before engine crank."

  - id: S04
    phase: P2
    critical: true
    observability: observable
    evidence_requirements:
      - var
      - gate
      - delta
    preconditions:
      - "APU READY light on."
    completion_conditions:
      - "ENG CRANK switch set to RIGHT; right engine spool-up observed."
    ui_targets:
      - eng_crank_switch
    tutor_prompts:
      - "With APU READY, set ENG CRANK to RIGHT to begin right engine start."

  - id: S05
    phase: P2
    critical: true
    observability: observable
    overlay_enabled: false
    evidence_requirements:
      - var
      - gate
    preconditions:
      - "Right engine RPM rising from S04."
    completion_conditions:
      - "Right throttle at IDLE."
      - "Throttle moved when RPM >=25%."
    ui_targets: []
    tutor_prompts:
      - "Monitor IFEI; when right RPM passes 25%, lift and move right throttle to IDLE."

  - id: S06
    phase: P2
    critical: false
    observability: observable
    evidence_requirements:
      - var
      - gate
      - delta
    preconditions:
      - "Right engine stabilized above 60% RPM."
    completion_conditions:
      - "BLEED AIR knob rotated full clockwise back to NORM."
    ui_targets:
      - bleed_air_knob
    tutor_prompts:
      - "After right RPM >60%, rotate BLEED AIR knob through a full clockwise turn to NORM."

  - id: S07
    phase: P2
    critical: false
    observability: observable
    overlay_enabled: false
    evidence_requirements:
      - var
      - delta
      - gate
    preconditions:
      - "Right engine stabilized; electrical power available."
    completion_conditions:
      - "Light test executed with all annunciators verified."
    ui_targets: []
    tutor_prompts:
      - "Lights test is currently skipped in the live tutor flow; proceed to display power-up once the right engine is stabilized."

  - id: S08
    phase: P3
    critical: false
    observability: observable
    evidence_requirements:
      - var
      - gate
      - delta
    preconditions:
      - "Right engine running; electrical power stable."
    completion_conditions:
      - "Left DDI shows FCS page; right DDI shows BIT page."
      - "MPCD and HUD powered."
    ui_targets:
      - left_mdi_brightness_selector
      - right_mdi_brightness_selector
      - ampcd_off_brightness_knob
      - hud_symbology_brightness_knob
      - left_mdi_pb18
      - left_mdi_pb15
      - right_mdi_pb18
      - right_mdi_pb5
    tutor_prompts:
      - "Power DDIs/MPCD/HUD. If a display is dark, use its brightness selector first. On the left DDI, if the FCS page is not already visible, use PB18 MENU until the root menu page appears, then press PB15 FCS. On the right DDI, recover BIT with PB18 MENU if needed; the correct top BIT page is the one showing the BIT headings, and PB5 enters FCS-MC from there."

  - id: S09
    phase: P3
    critical: false
    observability: observable
    evidence_requirements:
      - var
      - delta
      - rag
    preconditions:
      - "Displays powered (S08 complete)."
    completion_conditions:
      - "COMM1 and COMM2 set to assigned frequencies/presets."
    ui_targets:
      - ufc_comm1_channel_selector_pull
      - ufc_comm1_channel_selector_rotate
      - ufc_comm2_channel_selector_pull
      - ufc_comm2_channel_selector_rotate
    tutor_prompts:
      - "Use UFC/comm panels to set COMM1 and COMM2 to mission frequencies/presets; verify the radio values from UFC/BIOS readouts."

  - id: S10
    phase: P4
    critical: true
    observability: observable
    evidence_requirements:
      - var
      - gate
      - delta
    preconditions:
      - "Right engine stabilized: RPM 63-70%, TEMP 190-590 degC, FF 420-900 PPH, nozzle 73-84%, OIL 45-110 psi."
    completion_conditions:
      - "ENG CRANK switch set to LEFT; left engine spool-up observed."
    ui_targets:
      - eng_crank_switch
    tutor_prompts:
      - "If right engine parameters are in green ranges, move ENG CRANK to LEFT for left engine start."

  - id: S11
    phase: P4
    critical: true
    observability: observable
    overlay_enabled: false
    evidence_requirements:
      - var
      - gate
    preconditions:
      - "ENG CRANK already in LEFT and left engine spool-up underway."
      - "Left RPM reaches at least 25%."
    completion_conditions:
      - "Left throttle moved from OFF to IDLE when RPM >=25%."
    ui_targets: []
    tutor_prompts:
      - "Monitor left RPM; once >=25%, advance left throttle OFF to IDLE."

  - id: S12
    phase: P4
    critical: true
    observability: observable
    evidence_requirements:
      - var
      - gate
    preconditions:
      - "Left engine RPM >60% and left throttle not in OFF."
    completion_conditions:
      - "INS knob set to GND (airfield) or CV (carrier)."
    ui_targets:
      - ins_mode_knob
    tutor_prompts:
      - "When left engine RPM exceeds 60%, set INS knob to GND or CV for alignment."

  - id: S13
    phase: P4
    critical: true
    observability: observable
    evidence_requirements:
      - var
      - gate
    preconditions:
      - "INS mode configured for alignment."
    completion_conditions:
      - "Radar knob in OPR and radar power online."
    ui_targets:
      - radar_mode_knob
    tutor_prompts:
      - "After INS mode is set, rotate radar knob to OPR."

  - id: S14
    phase: P4
    critical: true
    observability: observable
    evidence_requirements:
      - var
      - gate
    preconditions:
      - "Radar and core avionics are online."
    completion_conditions:
      - "OBOGS control and FLOW switches confirmed ON."
    ui_targets:
      - obogs_control_switch
      - obogs_flow_knob
    tutor_prompts:
      - "Set OBOGS and FLOW to ON."

  - id: S15
    phase: P5
    critical: true
    observability: partial
    evidence_requirements:
      - delta
      - gate
      - visual
    preconditions:
      - "Left DDI is powered and FCS page available."
    completion_conditions:
      - "FCS RESET manually pressed."
      - "FCS page brought up and reviewed for faults."
    ui_targets:
      - fcs_reset_button
      - left_mdi_pb18
      - left_mdi_pb15
    tutor_prompts:
      - "If the left DDI is not already on the FCS page, use PB18 MENU to cycle back to the root menu and press PB15 FCS. Then press FCS RESET and review the left DDI FCS page to confirm the fault/X marks clear."

  - id: S16
    phase: P5
    critical: true
    observability: observable
    evidence_requirements:
      - var
      - gate
    preconditions:
      - "FCS checks reviewed and displays stable."
    completion_conditions:
      - "Flap switch confirmed in AUTO."
    ui_targets:
      - flap_switch
    tutor_prompts:
      - "Set flap switch to AUTO."

  - id: S17
    phase: P5
    critical: true
    observability: partial
    evidence_requirements:
      - delta
      - gate
    preconditions:
      - "Flap mode set and left display powered."
    completion_conditions:
      - "TAKEOFF TRIM button pressed and trim set."
    ui_targets:
      - takeoff_trim_button
    tutor_prompts:
      - "Press TAKEOFF TRIM."

  - id: S18
    phase: P5
    critical: true
    observability: partial
    evidence_requirements:
      - delta
      - gate
      - visual
    preconditions:
      - "Right DDI powered and BIT/FCS page available."
    completion_conditions:
      - "FCS BIT interaction performed and result reviewed."
    ui_targets:
      - fcs_bit_switch
      - right_mdi_pb18
      - right_mdi_pb5
    tutor_prompts:
      - "On the right DDI, recover to the BIT flow with PB18 MENU if needed. From the BIT top page, press PB5 FCS-MC. When the FCS-MC page is showing the FCS option on PB5, hold the right-wall FCS BIT switch and press PB5 FCS together until the page shows IN TEST."

  - id: S19
    phase: P5
    critical: true
    observability: partial
    evidence_requirements:
      - delta
      - rag
      - gate
    preconditions:
      - "Core avionics and FCS BIT checks complete."
    completion_conditions:
      - "Four-down checklist completed and all items cross-checked."
    ui_targets:
      - refuel_probe_switch
      - throttle_quadrant_reference
      - launch_bar_switch
      - arresting_hook_handle
      - pitot_heater_switch
      - flap_switch
    tutor_prompts:
      - "Execute the full four-down checklist; telemetry can observe several switch states, but the full sequence still needs confirmation."

  - id: S20
    phase: P6
    critical: true
    observability: observable
    evidence_requirements:
      - var
      - gate
    preconditions:
      - "Four-down checks completed and taxi prep ongoing."
    completion_conditions:
      - "Parking brake released and aircraft ready to roll."
    ui_targets:
      - parking_brake_handle
    tutor_prompts:
      - "Release parking brake when taxi checklist is complete."

  - id: S21
    phase: P6
    critical: true
    observability: observable
    evidence_requirements:
      - var
      - gate
    preconditions:
      - "Pre-taxi instrument configuration in progress."
    completion_conditions:
      - "BINGO fuel value set to mission requirement."
    ui_targets:
      - ifei_up_button
      - ifei_down_button
    tutor_prompts:
      - "Set BINGO fuel on the IFEI to the mission target."

  - id: S22
    phase: P6
    critical: true
    observability: partial
    evidence_requirements:
      - delta
      - rag
      - gate
    preconditions:
      - "BINGO setup complete and instrument checks underway."
    completion_conditions:
