vars:
  # Power
  # BATTERY_SW is a 3-position selector exported as 0/1/2.
  # In current FA-18C scripts/log captures, OFF is 1 and ON is 2.
  battery_on: "bios.BATTERY_SW == 2"
  ext_pwr_on: "bios.EXT_PWR_SW == 1"
  l_gen_on: "bios.L_GEN_SW == 1"
  r_gen_on: "bios.R_GEN_SW == 1"
  power_available: "derived((vars.battery_on or vars.ext_pwr_on) and vars.l_gen_on and vars.r_gen_on)"

  # APU
  apu_on: "bios.APU_CONTROL_SW == 1"
  apu_ready: "bios.APU_READY_LT == 1"

  # Engine start
  # ENGINE_CRANK_SW is LEFT/OFF/RIGHT => 0/1/2 (DCS clickable: springloaded_3_pos_tumb2)
  engine_crank_right: "bios.ENGINE_CRANK_SW == 2"
  engine_crank_left: "bios.ENGINE_CRANK_SW == 0"
  bleed_air_norm: "bios.BLEED_AIR_KNOB == 2"

  # Engine instruments (IFEI + external nozzle position)
  rpm_r: "derived(num(bios.IFEI_RPM_R))"
  rpm_l: "derived(num(bios.IFEI_RPM_L))"
  # Internal throttle axes (0 means OFF/cutoff-side in current captures).
  # For S05 we only need to know whether right throttle left OFF detent.
  throttle_r_not_off: "derived(num(bios.INT_THROTTLE_RIGHT) > 0)"
  throttle_l_not_off: "derived(num(bios.INT_THROTTLE_LEFT) > 0)"
  temp_r: "derived(num(bios.IFEI_TEMP_R))"
  temp_l: "derived(num(bios.IFEI_TEMP_L))"
  ff_r: "derived(num(bios.IFEI_FF_R))"
  ff_l: "derived(num(bios.IFEI_FF_L))"
  oil_r: "derived(num(bios.IFEI_OIL_PRESS_R))"
  oil_l: "derived(num(bios.IFEI_OIL_PRESS_L))"
  noz_r: "derived((num(bios.EXT_NOZZLE_POS_R) * 100) / 65535)"
  noz_l: "derived((num(bios.EXT_NOZZLE_POS_L) * 100) / 65535)"

  # Startup thresholds and right-engine nominal checks (S05/S06/S10)
  rpm_r_gte_25: "derived(vars.rpm_r >= 25)"
  rpm_r_gte_60: "derived(vars.rpm_r >= 60)"
  rpm_l_gte_60: "derived(vars.rpm_l >= 60)"
  rpm_r_in_range: "derived(vars.rpm_r >= 63 and vars.rpm_r <= 70)"
  temp_r_in_range: "derived(vars.temp_r >= 190 and vars.temp_r <= 590)"
  ff_r_in_range: "derived(vars.ff_r >= 420 and vars.ff_r <= 900)"
  oil_r_in_range: "derived(vars.oil_r >= 45 and vars.oil_r <= 110)"
  noz_r_in_range: "derived(vars.noz_r >= 73 and vars.noz_r <= 84)"
  right_engine_nominal_start_params: "derived(vars.rpm_r_in_range and vars.temp_r_in_range and vars.ff_r_in_range and vars.oil_r_in_range and vars.noz_r_in_range)"

  # Displays / avionics
  left_ddi_on: "bios.LEFT_DDI_BRT_CTL > 0"
  right_ddi_on: "bios.RIGHT_DDI_BRT_CTL > 0"
  mpcd_on: "bios.AMPCD_BRT_CTL > 0"
  hud_on: "bios.HUD_SYM_BRT > 0"

  # Key switches
  fire_test_active: "bios.FIRE_TEST_SW == 1"
  ins_mode: "bios.INS_SW"
  radar_on: "bios.RADAR_SW > 0"
