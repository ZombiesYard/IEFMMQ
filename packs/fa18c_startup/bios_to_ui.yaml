version: v1
mappings:
  BATTERY_SW:
    - battery_switch
  L_GEN_SW:
    - generator_left_switch
  R_GEN_SW:
    - generator_right_switch
  APU_CONTROL_SW:
    - apu_switch
  ENGINE_CRANK_SW:
    - eng_crank_switch
  FIRE_TEST_SW:
    - fire_test_switch
  BLEED_AIR_KNOB:
    - bleed_air_knob

  LEFT_DDI_BRT_CTL:
    - left_mdi_brightness_selector
  RIGHT_DDI_BRT_CTL:
    - right_mdi_brightness_selector
  AMPCD_BRT_CTL:
    - ampcd_off_brightness_knob
  HUD_SYM_BRT:
    - hud_symbology_brightness_knob
  RIGHT_MDI_PB_5:
    - right_mdi_pb5
  LEFT_MDI_PB_5:
    - left_mdi_pb5
  FCS_BIT_SW:
    - fcs_bit_switch

  COMM1_CHAN:
    targets:
      - ufc_comm1_channel_selector_rotate
      - ufc_comm1_channel_selector_pull
  COMM2_CHAN:
    targets:
      - ufc_comm2_channel_selector_rotate
      - ufc_comm2_channel_selector_pull
