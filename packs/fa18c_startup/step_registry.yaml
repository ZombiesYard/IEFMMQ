schema_version: v1
registry_id: fa18c_startup_canonical_steps
registry_title: F/A-18C Cold Start Canonical Step Registry
source_of_truth:
- fa18c_startup_master/fa18c_startup_master_1
steps:
- step_id: S01
  phase: P1
  phase_label: Power-up & safety
  official_description: Set the BATTERY switch to ON and confirm both Left and Right
    Generators are ON.
  short_explanation: Turn on aircraft battery and verify both generators are on to
    power the jet.
  cockpit_area: Right console
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:4-4
- step_id: S02
  phase: P1
  phase_label: Power-up & safety
  official_description: Move and hold the fire detection switch to FIRE TEST A and
    wait for all the audio caution messages to play. Once complete, wait 10 seconds
    and then do the same for FIRE TEST B. Between running FIRE TEST A and FIRE TEST
    B, you can reset the battery switch to rewind the fire test tape.
  short_explanation: Run fire detection tests A and B and listen for all caution tones
    to confirm the fire warning system works.
  cockpit_area: Left console
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:5-5
- step_id: S03
  phase: P1
  phase_label: Power-up & safety
  official_description: APU switch to ON and wait for green APU READY light.
  short_explanation: Start the APU and wait until the APU READY light comes on.
  cockpit_area: Left console
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:6-6
- step_id: S04
  phase: P2
  phase_label: Right engine start
  official_description: Move the ENG CRANK switch to the right to start the right
    engine.
  short_explanation: Set the engine crank switch to RIGHT to begin right engine start.
  cockpit_area: Left console
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:7-7
- step_id: S05
  phase: P2
  phase_label: Right engine start
  official_description: Move the right throttle from OFF to IDLE when the right engine
    is above 25% rpm (as shown on IFEI).
  short_explanation: When right engine RPM passes 25%, advance the right throttle
    from OFF to IDLE.
  cockpit_area: Throttles / IFEI
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:8-8
- step_id: S06
  phase: P2
  phase_label: Right engine start
  official_description: Once right engine RPM is over 60%, rotate the BLEED AIR knob
    360° clockwise, from NORM to NORM.
  short_explanation: After the right engine stabilizes above 60% RPM, rotate the BLEED
    AIR knob through a full clockwise turn to confirm operation.
  cockpit_area: Right console
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:9-9
- step_id: S07
  phase: P2
  phase_label: Right engine start
  official_description: Test the CAUTION, WARNING and ADVISORY lights test.
  short_explanation: Run the caution/warning/advisory lights test and verify all annunciators
    illuminate correctly.
  cockpit_area: Right console
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:10-10
- step_id: S08
  phase: P3
  phase_label: Displays & comms
  official_description: Turn on the power to both DDIs, MPCD and HUD. Select the FCS
    page on the left DDI and the BIT page on the right DDI.
  short_explanation: Power up both DDIs, MPCD and HUD, then show FCS on the left DDI
    and BIT on the right DDI.
  cockpit_area: Center instrument panel
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:11-11
- step_id: S09
  phase: P3
  phase_label: Displays & comms
  official_description: Set COMM 1 and COMM 2 radios as required for the mission.
  short_explanation: Set COMM1 and COMM2 radios to the preset frequencies used in
    the training mission.
  cockpit_area: UFC / comm panels
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:12-12
- step_id: S10
  phase: P4
  phase_label: Left engine & core systems
  official_description: Move the ENG CRANK switch to the left after confirming that
    the right engine has an rpm between 63 and 70%, a TEMP between 190° and 590°,
    Fuel Flow between 420 and 900 PPH, a nozzle position between 73 and 84%, and an
    OIL pressure between 45 and 110 psi.
  short_explanation: Verify right engine parameters are in normal ranges, then set
    the engine crank switch to LEFT for left engine start.
  cockpit_area: Left console / IFEI
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:13-13
- step_id: S11
  phase: P4
  phase_label: Left engine & core systems
  official_description: Move the left throttle from OFF to IDLE when left engine has
    reached at least 25% rpm.
  short_explanation: When left engine RPM passes 25%, advance the left throttle from
    OFF to IDLE.
  cockpit_area: Throttles / IFEI
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:14-14
- step_id: S12
  phase: P4
  phase_label: Left engine & core systems
  official_description: Once the left engine has an RPM greater than 60%, rotate the
    INS knob to GND (ground) or CV (carrier), depending on your parking location.
  short_explanation: After the left engine stabilizes above 60% RPM, set the INS knob
    to GND (airfield) or CV (carrier) to start alignment.
  cockpit_area: Right console
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:15-15
- step_id: S13
  phase: P4
  phase_label: Left engine & core systems
  official_description: Set the Radar knob to OPR (operate).
  short_explanation: Turn the radar power knob to OPR to bring the radar online.
  cockpit_area: Right console
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:16-16
- step_id: S14
  phase: P4
  phase_label: Left engine & core systems
  official_description: Set the OBOGS control switch and FLOW switch to ON.
  short_explanation: Turn OBOGS and OBOGS FLOW to ON to enable onboard oxygen generation.
  cockpit_area: Left console
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:17-17
- step_id: S15
  phase: P5
  phase_label: FCS & flight controls
  official_description: Press the FCS RESET button and monitor FCS DDI page.
  short_explanation: Press FCS RESET and watch the FCS page for any faults.
  cockpit_area: Left console / left DDI
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:18-18
- step_id: S16
  phase: P5
  phase_label: FCS & flight controls
  official_description: Set the Flap switch to AUTO.
  short_explanation: Set the flap switch to AUTO for normal takeoff configuration.
  cockpit_area: Left quarter panel
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:19-19
- step_id: S17
  phase: P5
  phase_label: FCS & flight controls
  official_description: Press Takeoff Trim button.
  short_explanation: Press the TAKEOFF TRIM button to set stabilator trim for takeoff.
  cockpit_area: Left console
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:20-20
- step_id: S18
  phase: P5
  phase_label: FCS & flight controls
  official_description: While holding up the FCS BIT switch on the right wall, press
    the FCS OSB on the BIT / FCS page at the same time.
  short_explanation: 'Run the FCS BIT: hold the FCS BIT switch and press the FCS option
    on the BIT/FCS page simultaneously.'
  cockpit_area: Right console / right DDI
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:21-21
- step_id: S19
  phase: P5
  phase_label: FCS & flight controls
  official_description: Four down test. Cycle/test the refueling probe, speed brake,
    launch bar, arrestor hook, pitot heat, and set flaps to HALF.
  short_explanation: 'Perform the “four down” checks: cycle refueling probe, speed
    brake, launch bar, arrestor hook, pitot heat, and set flaps to HALF.'
  cockpit_area: Multiple (consoles, throttles, quarter panels)
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:22-22
- step_id: S20
  phase: P6
  phase_label: Pre-taxi instruments & final checks
  official_description: Left mouse click on the hand brake to release it.
  short_explanation: Release the parking brake when ready to taxi.
  cockpit_area: Left console (parking brake)
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:23-23
- step_id: S21
  phase: P6
  phase_label: Pre-taxi instruments & final checks
  official_description: Set your BINGO fuel level (minimum fuel to return home) by
    pressing the up and down arrows on the IFEI.
  short_explanation: Set the BINGO fuel on the IFEI to the mission’s minimum return
    fuel.
  cockpit_area: IFEI
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:24-24
- step_id: S22
  phase: P6
  phase_label: Pre-taxi instruments & final checks
  official_description: Set the Standby Barometric Altimeter to airfield elevation.
  short_explanation: Adjust the standby barometric altimeter to the current airfield
    elevation/QNH.
  cockpit_area: Right instrument panel
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:25-25
- step_id: S23
  phase: P6
  phase_label: Pre-taxi instruments & final checks
  official_description: Set the Radar Altimeter to 200 feet for an airfield takeoff
    or 40 feet from the carrier.
  short_explanation: Set the radar altimeter bug (low altitude warning) to 200 ft
    (airfield) or 40 ft (carrier).
  cockpit_area: Right quarter panel
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:26-26
- step_id: S24
  phase: P6
  phase_label: Pre-taxi instruments & final checks
  official_description: Uncage the standby Attitude Indicator.
  short_explanation: Uncage the standby attitude indicator so it can display correct
    pitch/roll.
  cockpit_area: Right instrument panel
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:27-27
- step_id: S25
  phase: P6
  phase_label: Pre-taxi instruments & final checks
  official_description: Set the Attitude Source to AUTO.
  short_explanation: Set the attitude source selector to AUTO to use the normal attitude
    reference.
  cockpit_area: Center instrument panel
  source_chunk_refs:
  - fa18c_startup_master/fa18c_startup_master_1:28-28
