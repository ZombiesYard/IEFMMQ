name: ci-guard

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main", "master", "develop"]

permissions:
  contents: read
  id-token: write
  checks: write
  pull-requests: write
  statuses: write

jobs:
  guard-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov

      - name: Run CI guardrails
        run: |
          python tools/ci_guard.py

      - name: Run tests
        run: |
          pytest -q \
            --cov=adapters \
            --cov=core \
            --cov=ports \
            --cov=simtutor \
            --cov=tools \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: simtutor-py310
          use_oidc: true
          fail_ci_if_error: false

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./coverage.xml
          format: cobertura
          flag-name: unittests
          fail-on-error: false
